name: Linux Host Bundle Check

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify-linux-host-bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Verify shell file modes in linux host ZIP
        run: ./gradlew verifyLinuxHostBundleScriptModes
