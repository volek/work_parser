name: Linux Host CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  linux-host-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build and run tests
        run: ./gradlew clean test jar

      - name: Verify query manifest
        run: ./gradlew verifyQueryManifest

      - name: Verify linux host bundle script modes
        run: ./gradlew verifyLinuxHostBundleScriptModes

      - name: Smoke test CLI help
        run: java -jar build/libs/bpm-druid-parser-1.0.0.jar help
