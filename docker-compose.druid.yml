# =============================================================================
# Apache Druid - Standalone Docker Compose Configuration
# =============================================================================
# Отдельный файл для запуска Druid кластера.
#
# Запуск полного кластера:
#   docker compose -f docker-compose.druid.yml up -d
#
# Запуск standalone (single container):
#   docker compose -f docker-compose.druid.yml --profile standalone up -d druid-standalone postgres zookeeper
#
# Остановка:
#   docker compose -f docker-compose.druid.yml down
#
# Web Console: http://localhost:8888
# =============================================================================

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - метаданные Druid
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: druid-postgres
    environment:
      POSTGRES_DB: druid
      POSTGRES_USER: druid
      POSTGRES_PASSWORD: druid_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druid"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - druid-network

  # ---------------------------------------------------------------------------
  # ZooKeeper - координация кластера Druid
  # ---------------------------------------------------------------------------
  zookeeper:
    image: zookeeper:3.9
    container_name: druid-zookeeper
    environment:
      ZOO_MY_ID: 1
      ZOO_4LW_COMMANDS_WHITELIST: ruok,stat
    volumes:
      - zookeeper-data:/data
      - zookeeper-datalog:/datalog
    healthcheck:
      test: ["CMD", "sh", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - druid-network

  # ---------------------------------------------------------------------------
  # Druid Coordinator
  # ---------------------------------------------------------------------------
  druid-coordinator:
    image: apache/druid:28.0.0
    container_name: druid-coordinator
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    environment:
      DRUID_SET_HOST: druid-coordinator
      druid_extensions_loadList: '["druid-histogram", "druid-datasketches", "druid-lookups-cached-global", "postgresql-metadata-storage"]'
      druid_metadata_storage_type: postgresql
      druid_metadata_storage_connector_connectURI: jdbc:postgresql://postgres:5432/druid
      druid_metadata_storage_connector_user: druid
      druid_metadata_storage_connector_password: druid_password
      druid_coordinator_balancer_strategy: cachingCost
      druid_indexer_runner_javaOptsArray: '["-server", "-Xmx512m", "-Xms512m", "-XX:MaxDirectMemorySize=1g"]'
      druid_indexer_fork_property_druid_processing_buffer_sizeBytes: "128MiB"
      druid_zk_service_host: zookeeper:2181
    volumes:
      - druid-coordinator-var:/opt/druid/var
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8081/status/health"]
      interval: 30s
      timeout: 30s
      retries: 20
      start_period: 120s
    command:
      - coordinator
    networks:
      - druid-network

  # ---------------------------------------------------------------------------
  # Druid Overlord
  # ---------------------------------------------------------------------------
  druid-overlord:
    image: apache/druid:28.0.0
    container_name: druid-overlord
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    environment:
      DRUID_SET_HOST: druid-overlord
      druid_extensions_loadList: '["druid-histogram", "druid-datasketches", "druid-lookups-cached-global", "postgresql-metadata-storage", "druid-kafka-indexing-service"]'
      druid_metadata_storage_type: postgresql
      druid_metadata_storage_connector_connectURI: jdbc:postgresql://postgres:5432/druid
      druid_metadata_storage_connector_user: druid
      druid_metadata_storage_connector_password: druid_password
      druid_indexer_runner_javaOptsArray: '["-server", "-Xmx512m", "-Xms512m", "-XX:MaxDirectMemorySize=1g"]'
      druid_indexer_fork_property_druid_processing_buffer_sizeBytes: "128MiB"
      druid_zk_service_host: zookeeper:2181
    volumes:
      - druid-overlord-var:/opt/druid/var
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8090/status/health"]
      interval: 30s
      timeout: 30s
      retries: 20
      start_period: 120s
    command:
      - overlord
    networks:
      - druid-network

  # ---------------------------------------------------------------------------
  # Druid Broker
  # ---------------------------------------------------------------------------
  druid-broker:
    image: apache/druid:28.0.0
    container_name: druid-broker
    depends_on:
      druid-coordinator:
        condition: service_healthy
      druid-overlord:
        condition: service_healthy
    environment:
      DRUID_SET_HOST: druid-broker
      druid_extensions_loadList: '["druid-histogram", "druid-datasketches", "druid-lookups-cached-global", "postgresql-metadata-storage"]'
      druid_metadata_storage_type: postgresql
      druid_metadata_storage_connector_connectURI: jdbc:postgresql://postgres:5432/druid
      druid_metadata_storage_connector_user: druid
      druid_metadata_storage_connector_password: druid_password
      druid_broker_cache_useCache: "true"
      druid_broker_cache_populateCache: "true"
      druid_zk_service_host: zookeeper:2181
    volumes:
      - druid-broker-var:/opt/druid/var
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8082/status/health"]
      interval: 30s
      timeout: 30s
      retries: 20
      start_period: 120s
    command:
      - broker
    networks:
      - druid-network

  # ---------------------------------------------------------------------------
  # Druid Historical
  # ---------------------------------------------------------------------------
  druid-historical:
    image: apache/druid:28.0.0
    container_name: druid-historical
    depends_on:
      druid-coordinator:
        condition: service_healthy
      druid-overlord:
        condition: service_healthy
    environment:
      DRUID_SET_HOST: druid-historical
      druid_extensions_loadList: '["druid-histogram", "druid-datasketches", "druid-lookups-cached-global", "postgresql-metadata-storage"]'
      druid_metadata_storage_type: postgresql
      druid_metadata_storage_connector_connectURI: jdbc:postgresql://postgres:5432/druid
      druid_metadata_storage_connector_user: druid
      druid_metadata_storage_connector_password: druid_password
      druid_processing_buffer_sizeBytes: "128MiB"
      druid_processing_numMergeBuffers: "2"
      druid_processing_numThreads: "2"
      druid_segmentCache_locations: '[{"path":"/opt/druid/var/druid/segment-cache","maxSize":"5g"}]'
      druid_zk_service_host: zookeeper:2181
    volumes:
      - druid-historical-var:/opt/druid/var
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8083/status/health"]
      interval: 30s
      timeout: 30s
      retries: 20
      start_period: 120s
    command:
      - historical
    networks:
      - druid-network

  # ---------------------------------------------------------------------------
  # Druid MiddleManager
  # ---------------------------------------------------------------------------
  druid-middlemanager:
    image: apache/druid:28.0.0
    container_name: druid-middlemanager
    depends_on:
      druid-coordinator:
        condition: service_healthy
      druid-overlord:
        condition: service_healthy
    environment:
      DRUID_SET_HOST: druid-middlemanager
      druid_extensions_loadList: '["druid-histogram", "druid-datasketches", "druid-lookups-cached-global", "postgresql-metadata-storage", "druid-kafka-indexing-service"]'
      druid_metadata_storage_type: postgresql
      druid_metadata_storage_connector_connectURI: jdbc:postgresql://postgres:5432/druid
      druid_metadata_storage_connector_user: druid
      druid_metadata_storage_connector_password: druid_password
      druid_indexer_runner_javaOptsArray: '["-server", "-Xmx512m", "-Xms512m", "-XX:MaxDirectMemorySize=512m"]'
      druid_indexer_fork_property_druid_processing_buffer_sizeBytes: "128MiB"
      druid_worker_capacity: "2"
      druid_zk_service_host: zookeeper:2181
    volumes:
      - druid-middlemanager-var:/opt/druid/var
    ports:
      - "8091:8091"
      - "8100-8105:8100-8105"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8091/status/health"]
      interval: 30s
      timeout: 30s
      retries: 20
      start_period: 120s
    command:
      - middleManager
    networks:
      - druid-network

  # ---------------------------------------------------------------------------
  # Druid Router (Web Console)
  # ---------------------------------------------------------------------------
  druid-router:
    image: apache/druid:28.0.0
    container_name: druid-router
    depends_on:
      druid-broker:
        condition: service_healthy
    environment:
      DRUID_SET_HOST: druid-router
      druid_extensions_loadList: '["druid-histogram", "druid-datasketches", "druid-lookups-cached-global", "postgresql-metadata-storage"]'
      druid_metadata_storage_type: postgresql
      druid_metadata_storage_connector_connectURI: jdbc:postgresql://postgres:5432/druid
      druid_metadata_storage_connector_user: druid
      druid_metadata_storage_connector_password: druid_password
      druid_router_defaultBrokerServiceName: druid/broker
      druid_router_coordinatorServiceName: druid/coordinator
      druid_zk_service_host: zookeeper:2181
    volumes:
      - druid-router-var:/opt/druid/var
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8888/status/health"]
      interval: 30s
      timeout: 30s
      retries: 20
      start_period: 120s
    command:
      - router
    networks:
      - druid-network

  # ---------------------------------------------------------------------------
  # Druid Standalone (Single Container) - Profile: standalone
  # ---------------------------------------------------------------------------
  druid-standalone:
    image: apache/druid:28.0.0
    container_name: druid-standalone
    profiles:
      - standalone
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    environment:
      DRUID_SET_HOST: druid-standalone
      druid_extensions_loadList: '["druid-histogram", "druid-datasketches", "druid-lookups-cached-global", "postgresql-metadata-storage", "druid-kafka-indexing-service", "druid-multi-stage-query"]'
      druid_metadata_storage_type: postgresql
      druid_metadata_storage_connector_connectURI: jdbc:postgresql://postgres:5432/druid
      druid_metadata_storage_connector_user: druid
      druid_metadata_storage_connector_password: druid_password
      druid_zk_service_host: zookeeper:2181
      druid_processing_buffer_sizeBytes: "128MiB"
      druid_processing_numMergeBuffers: "2"
      druid_processing_numThreads: "2"
      druid_indexer_runner_javaOptsArray: '["-server", "-Xmx1g", "-Xms1g", "-XX:MaxDirectMemorySize=1g"]'
      druid_indexer_fork_property_druid_processing_buffer_sizeBytes: "128MiB"
      druid_coordinator_balancer_strategy: cachingCost
      druid_broker_cache_useCache: "true"
      druid_broker_cache_populateCache: "true"
      druid_router_defaultBrokerServiceName: druid/broker
      druid_router_coordinatorServiceName: druid/coordinator
      druid_segmentCache_locations: '[{"path":"/opt/druid/var/druid/segment-cache","maxSize":"5g"}]'
      druid_worker_capacity: "2"
      druid_sql_enable: "true"
    volumes:
      - druid-standalone-var:/opt/druid/var
    ports:
      - "8888:8888"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8090:8090"
      - "8091:8091"
      - "8100-8105:8100-8105"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8888/status/health"]
      interval: 30s
      timeout: 30s
      retries: 30
      start_period: 180s
    command:
      - start-druid
    networks:
      - druid-network
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 4G

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
  zookeeper-data:
  zookeeper-datalog:
  druid-coordinator-var:
  druid-overlord-var:
  druid-broker-var:
  druid-historical-var:
  druid-middlemanager-var:
  druid-router-var:
  druid-standalone-var:

# =============================================================================
# Networks
# =============================================================================
networks:
  druid-network:
    driver: bridge
