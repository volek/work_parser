# =============================================================================
# Apache Druid - Common Runtime Properties
# =============================================================================
# Общие настройки для всех компонентов Druid
# =============================================================================

# Extensions
druid.extensions.loadList=["druid-histogram", "druid-datasketches", "druid-lookups-cached-global", "postgresql-metadata-storage", "druid-kafka-indexing-service", "druid-multi-stage-query"]

# Metadata storage (PostgreSQL)
druid.metadata.storage.type=postgresql
druid.metadata.storage.connector.connectURI=jdbc:postgresql://postgres:5432/druid
druid.metadata.storage.connector.user=druid
druid.metadata.storage.connector.password=druid_password

# ZooKeeper
druid.zk.service.host=zookeeper:2181
druid.zk.paths.base=/druid

# Deep storage (local)
druid.storage.type=local
druid.storage.storageDirectory=/opt/druid/var/druid/segments

# Indexing service logs
druid.indexer.logs.type=file
druid.indexer.logs.directory=/opt/druid/var/druid/indexing-logs

# Service discovery
druid.selectors.indexing.serviceName=druid/overlord
druid.selectors.coordinator.serviceName=druid/coordinator

# Monitoring
druid.monitoring.monitors=["org.apache.druid.java.util.metrics.JvmMonitor"]
druid.emitter=logging
druid.emitter.logging.logLevel=info

# SQL
druid.sql.enable=true
druid.sql.planner.useGroupingSetForExactDistinct=true

# Lookups
druid.lookup.enableLookupSyncOnStartup=false

# Request logging (optional)
# druid.request.logging.type=slf4j
# druid.request.logging.dir=/opt/druid/var/log

# Security (basic)
druid.auth.authenticatorChain=["allowAll"]
druid.auth.authorizers=["allowAll"]
druid.auth.authenticator.allowAll.type=allowAll
druid.auth.authorizer.allowAll.type=allowAll
