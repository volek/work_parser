# =============================================================================
# BPM Message Parser - Configuration
# =============================================================================
# Конфигурация приложения. Переменные окружения имеют приоритет над этим файлом.
#
# Порядок приоритета:
#   1. Переменные окружения (DRUID_BROKER_URL, etc.)
#   2. Значения из этого файла
#   3. Значения по умолчанию в коде
# =============================================================================

druid:
  # ---------------------------------------------------------------------------
  # URL-адреса компонентов Druid
  # ---------------------------------------------------------------------------
  # Broker - для SQL запросов
  brokerUrl: "http://localhost:8082"
  
  # Coordinator - управление сегментами
  coordinatorUrl: "http://localhost:8081"
  
  # Overlord - управление задачами индексации (часто 8081, в standalone по умолчанию 8090)
  overlordUrl: "http://localhost:8081"
  
  # Router - унифицированная точка входа (Web Console)
  routerUrl: "http://localhost:8888"

  # ---------------------------------------------------------------------------
  # Basic auth (если Druid/прокси требует логин/пароль)
  # Можно оставить пустым и задать через переменные окружения:
  #   DRUID_USERNAME, DRUID_PASSWORD
  # ---------------------------------------------------------------------------
  # username: "my-user"
  # password: "my-password"
  
  # ---------------------------------------------------------------------------
  # Таймауты подключения (в миллисекундах)
  # ---------------------------------------------------------------------------
  connectTimeout: 30000
  readTimeout: 60000

  # ---------------------------------------------------------------------------
  # TLS/SSL (для https:// endpoint'ов Druid)
  # ---------------------------------------------------------------------------
  # Рекомендуемый путь: задать truststore с корпоративным CA/сертификатом.
  # Можно переопределить переменными окружения:
  #   DRUID_TRUST_STORE_PATH
  #   DRUID_TRUST_STORE_PASSWORD
  #   DRUID_TRUST_STORE_TYPE (JKS|PKCS12)
  #
  # Пример:
  # trustStorePath: "C:/certs/druid-truststore.jks"
  # trustStorePassword: "changeit"
  # trustStoreType: "JKS"
  #
  # КРАЙНИЙ случай для dev/test: отключить проверку TLS (опасно).
  insecureSkipTlsVerify: true
  
  # ---------------------------------------------------------------------------
  # Настройки пакетной обработки
  # ---------------------------------------------------------------------------
  # Размер пакета для ingestion
  batchSize: 1000

# =============================================================================
# Parser (для стратегий combined и compcom)
# =============================================================================
# Переменная окружения PARSER_WARM_VARIABLES_LIMIT переопределяет значение из файла.
# parser:
#   # Лимит записей process_variables_indexed на одно сообщение (10..1010, шаг 100).
#   # Не задано = без ограничения.
#   warmVariablesLimit: 110
