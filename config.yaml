# =============================================================================
# BPM Message Parser - Configuration
# =============================================================================
# Конфигурация приложения. Переменные окружения имеют приоритет над этим файлом.
#
# Порядок приоритета:
#   1. Переменные окружения (DRUID_BROKER_URL, etc.)
#   2. Значения из этого файла
#   3. Значения по умолчанию в коде
# =============================================================================

druid:
  # ---------------------------------------------------------------------------
  # URL-адреса компонентов Druid
  # ---------------------------------------------------------------------------
  # Broker - для SQL запросов
  brokerUrl: "https://omltd-abyss-sdp2-druid-10.opsmon.sbt:8282"
  
  # Coordinator - управление сегментами
  coordinatorUrl: "https://omltd-abyss-sdp2-druid-10.opsmon.sbt:8281"
  
  # Overlord - управление задачами индексации (часто 8081, в standalone по умолчанию 8090)
  overlordUrl: "https://omltd-abyss-sdp2-druid-10.opsmon.sbt:8290"
  
  # Router - унифицированная точка входа (Web Console)
  routerUrl: "https://omltd-abyss-sdp2-druid-10.opsmon.sbt:9088"
  
    # ---------------------------------------------------------------------------
  # Basic auth (если Druid/прокси требует логин/пароль)
  # Можно оставить пустым и задать через переменные окружения:
  #   DRUID_USERNAME, DRUID_PASSWORD
  # ---------------------------------------------------------------------------
  username: "admin"
  password: "admin"

  # ---------------------------------------------------------------------------
  # Таймауты подключения (в миллисекундах)
  # ---------------------------------------------------------------------------
  connectTimeout: 30000
  readTimeout: 60000

  # ---------------------------------------------------------------------------
  # TLS/SSL truststore для подключения к Druid
  # ---------------------------------------------------------------------------
  # Truststore создаётся на Linux скриптом `scripts/create-druid-truststore.sh`
  # (по умолчанию — в корне проекта: `druid-truststore.p12`).
  trustStorePath: "druid-truststore.p12"
  trustStorePassword: "changeit"
  trustStoreType: "PKCS12"
  insecureSkipTlsVerify: false
  
  # ---------------------------------------------------------------------------
  # Настройки пакетной обработки
  # ---------------------------------------------------------------------------
  # Размер пакета для ingestion
  batchSize: 1000
