# =============================================================================
# BPM Message Parser - Configuration
# =============================================================================
# Конфигурация приложения. Переменные окружения имеют приоритет над этим файлом.
#
# Порядок приоритета:
#   1. Переменные окружения (DRUID_BROKER_URL, etc.)
#   2. Значения из этого файла
#   3. Значения по умолчанию в коде
# =============================================================================

parser:
  warmVariablesLimit: 1010
  arrayMaxDepth: 3
  arrayObjectJsonBlobEnabled: true

druid:
  # ---------------------------------------------------------------------------
  # URL-адреса компонентов Druid
  # ---------------------------------------------------------------------------
  # Broker - для SQL запросов
  # Порядок важен: сначала primary (09), затем fallback (10)
  brokerUrls:
    - "https://omltd-abyss-sdp2-druid-09.opsmon.sbt:8282"
    - "https://omltd-abyss-sdp2-druid-10.opsmon.sbt:8282"
  
  # Coordinator - управление сегментами
  # Порядок важен: сначала primary (09), затем fallback (10)
  coordinatorUrls:
    - "https://omltd-abyss-sdp2-druid-09.opsmon.sbt:8281"
    - "https://omltd-abyss-sdp2-druid-10.opsmon.sbt:8281"
  
  # Overlord - управление задачами индексации (часто 8081, в standalone по умолчанию 8090)
  # Порядок важен: сначала primary (09), затем fallback (10)
  overlordUrls:
    - "https://omltd-abyss-sdp2-druid-09.opsmon.sbt:8290"
    - "https://omltd-abyss-sdp2-druid-10.opsmon.sbt:8290"
  
  # Router - унифицированная точка входа (Web Console)
  # Порядок важен: сначала primary (09), затем fallback (10)
  routerUrls:
    - "https://omltd-abyss-sdp2-druid-09.opsmon.sbt:9088"
    - "https://omltd-abyss-sdp2-druid-10.opsmon.sbt:9088"
  
    # ---------------------------------------------------------------------------
  # Basic auth (если Druid/прокси требует логин/пароль)
  # Можно оставить пустым и задать через переменные окружения:
  #   DRUID_USERNAME, DRUID_PASSWORD
  # ---------------------------------------------------------------------------
  username: "admin"
  password: "admin"

  # ---------------------------------------------------------------------------
  # Таймауты подключения (в миллисекундах)
  # ---------------------------------------------------------------------------
  connectTimeout: 30000
  readTimeout: 60000

  # ---------------------------------------------------------------------------
  # TLS/SSL truststore для подключения к Druid
  # ---------------------------------------------------------------------------
  # Truststore создаётся на Linux скриптом `scripts/create-druid-truststore.sh`
  # (по умолчанию — в корне проекта: `druid-truststore.p12`).
  trustStorePath: "druid-truststore.p12"
  trustStorePassword: "changeit"
  trustStoreType: "PKCS12"
  insecureSkipTlsVerify: false
  
  # ---------------------------------------------------------------------------
  # Настройки пакетной обработки
  # ---------------------------------------------------------------------------
  # Размер пакета для ingestion
  batchSize: 1000
  # Максимальный размер inline payload в bytes.
  # Должен оставаться заметно ниже 512KiB из-за лимита ZooKeeper znode у Overlord.
  maxInlineBytes: 256000
  # Повторные попытки batch при ошибке назначения task в Overlord
  # (Failed to assign this task)
  ingestionAssignRetryCount: 3
  # Пауза между retry (мс)
  ingestionAssignRetryDelayMs: 2000

schemaMetastore:
  enabled: false
  postgres:
    host: "localhost"
    port: 5432
    database: "parser_metastore"
    user: "postgres"
    password: "postgres"
    pool:
      maxPoolSize: 5
      connectionTimeoutMs: 10000
